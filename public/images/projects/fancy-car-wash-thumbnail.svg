<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-labelledby="title">
  <title id="title">Fancy Car Wash</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <radialGradient id="accent" cx="85%" cy="20%" r="60%">
      <stop offset="0" stop-color="#2ecf83" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2ecf83" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#accent)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  
  <g opacity="0.8">
    <path d="M150 40 C150 140 200 220 440 230" stroke="#2ecf83" stroke-width="1.5" fill="none"/>
    <path d="M190 40 C190 130 230 200 440 195" stroke="#2ecf83" stroke-opacity="0.6" stroke-width="1.5" fill="none"/>
    <path d="M230 40 C230 120 260 180 440 160" stroke="#2ecf83" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>
  </g>
  
  <text x="44" y="60" fill="#999" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="2">BRAND · DIGITAL</text>
  <text x="44" y="210" fill="#ffffff" font-family="Georgia, serif" font-size="72" font-weight="400">Fancy</text>
  <text x="44" y="282" fill="#2ecf83" font-family="Georgia, serif" font-size="56" font-weight="400">Car Wash</text>
  
  <g fill="none" stroke="#ffffff" stroke-opacity="0.25">
    <rect x="44" y="392" width="70" height="18" rx="9"/>
    <rect x="128" y="392" width="80" height="18" rx="9"/>
  </g>
  <text x="80" y="405" text-anchor="middle" fill="#ffffff" fill-opacity="0.8" font-family="system-ui, sans-serif" font-size="11">NEXT.JS</text>
  <text x="170" y="405" text-anchor="middle" fill="#ffffff" fill-opacity="0.8" font-family="system-ui, sans-serif" font-size="11">TYPESCRIPT</text>
</svg>