<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-labelledby="title">
  <title id="title">Project</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  
  <g fill="none" stroke="#ffffff" stroke-opacity="0.15">
    <rect x="100" y="120" width="580" height="24" rx="12"/>
    <rect x="100" y="170" width="420" height="16" rx="8"/>
    <rect x="100" y="200" width="380" height="16" rx="8"/>
    <rect x="100" y="270" width="200" height="200" rx="18"/>
    <rect x="320" y="270" width="200" height="200" rx="18"/>
    <rect x="540" y="270" width="140" height="200" rx="18"/>
  </g>
  
  <text x="44" y="60" fill="#999" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="2">PROJECT</text>
  <text x="44" y="392" fill="#ffffff" fill-opacity="0.8" font-family="system-ui, sans-serif" font-size="11">COMING SOON</text>
