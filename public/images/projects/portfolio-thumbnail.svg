    <path d="M 320 320 A 80 80 0 0 1 500 320"/>
    <path d="M 295 320 A 110 110 0 0 1 525 320"/>
    <path d="M 270 320 A 140 140 0 0 1 550 320"/>
  </g>
  
  <text x="44" y="60" fill="#999" font-family="system-ui, -apple-system, sans-serif" font-size="11" letter-spacing="2">PORTFOLIO · EDITORIAL</text>
  <text x="44" y="215" fill="#ffffff" font-family="Georgia, serif" font-size="72" font-weight="400">Personal</text>
  <text x="44" y="300" fill="#C9A870" font-family="Georgia, serif" font-size="72" font-weight="400">Portfolio</text>
  
  <text x="44" y="392" fill="#ffffff" fill-opacity="0.8" font-family="system-ui, sans-serif" font-size="11">NEXT.JS · TYPESCRIPT · TAILWIND CSS</text>
