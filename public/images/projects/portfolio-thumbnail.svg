<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-labelledby="title">
  <title id="title">Portfolio &amp; Communications Strategy</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <radialGradient id="accent" cx="90%" cy="20%" r="60%">
      <stop offset="0" stop-color="#C9A870" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#C9A870" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#accent)"/>
