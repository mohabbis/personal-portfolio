<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-labelledby="title">
  <title id="title">MuHome — Product Strategy</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D0C0B"/>
      <stop offset="1" stop-color="#141210"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="30%" r="52%">
      <stop offset="0" stop-color="#5BAAFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#5BAAFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmglow" cx="18%" cy="60%" r="45%">
      <stop offset="0" stop-color="#1A2A4A" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#1A2A4A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#2A2420" stroke-opacity="0.6" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <rect width="800" height="450" fill="url(#warmglow)"/>
  <rect width="800" height="450" fill="url(#grid)"/>

  <!-- Concentric signal rings -->
  <g fill="none" stroke="#5BAAFF" stroke-opacity="0.14" stroke-width="1.2">
    <circle cx="632" cy="225" r="55"/>
    <circle cx="632" cy="225" r="100"/>
    <circle cx="632" cy="225" r="145"/>
    <circle cx="632" cy="225" r="190"/>
  </g>
  <circle cx="632" cy="225" r="5" fill="#5BAAFF" opacity="0.4"/>

  <!-- Category eyebrow -->
  <text x="44" y="62" fill="#6B5E54" font-family="system-ui,-apple-system,sans-serif" font-size="11" letter-spacing="2.2" font-weight="500">PRODUCT STRATEGY · IOT</text>

  <!-- Title -->
  <text x="44" y="196" fill="#F0EBE0" font-family="Georgia,'Times New Roman',serif" font-size="78" font-weight="400">MuHome</text>
  <text x="44" y="270" fill="#5BAAFF" font-family="Georgia,'Times New Roman',serif" font-size="60" font-weight="400">Dashboard</text>

  <!-- DEMO badge -->
  <rect x="44" y="308" width="88" height="28" rx="14" fill="none" stroke="#5BAAFF" stroke-width="1.2" opacity="0.6"/>
  <text x="88" y="326" text-anchor="middle" fill="#5BAAFF" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">DEMO</text>

  <!-- Home icon (bottom right) -->
  <g transform="translate(716, 388)" fill="none" stroke="#5BAAFF" stroke-opacity="0.55" stroke-width="1.5" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M0,-30 L-34,-8 L34,-8 Z"/>
    <!-- Body -->
    <rect x="-24" y="-8" width="48" height="36" rx="2"/>
    <!-- Door -->
    <rect x="-8" y="12" width="16" height="16" rx="1"/>
    <!-- Window -->
    <rect x="8" y="-2" width="12" height="10" rx="1"/>
    <!-- Chimney -->
    <rect x="-18" y="-36" width="8" height="12"/>
  </g>

  <!-- Tags -->
  <text x="44" y="408" fill="#4A3E35" font-family="system-ui,sans-serif" font-size="11" letter-spacing="1">PRODUCT STRATEGY · USER RESEARCH · PROTOTYPING</text>
</svg>
