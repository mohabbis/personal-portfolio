# This workflow fixes detection issues for Deno test modules.
name: Deno

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Discover test files
        run: |
          echo "Finding test files in repository:"
          find . -type f \( -name "*.test.ts" -o -name "*.spec.ts" \)

      - name: Run Linter
        run: deno lint

      - name: Execute Tests
        run: |
          echo "Running test files from all directories."
          deno test -A || echo "Tests failed or not found." && exit 1