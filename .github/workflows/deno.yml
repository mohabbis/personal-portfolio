# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
documentation.

# This workflow will install Deno then run `deno lint` and `deno test`.
# For more information see: https://github.com/denoland/setup-deno

name: Deno

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: List all files in the repository
        run: |
          echo "Listing all files to identify test modules..."
          find . -type f

      - name: Run linter
        run: deno lint

      - name: Run tests
        run: |
          echo "Trying to detect and run test files in specific directories..."
          deno test -A ./tests || echo "No test files found in ./tests"
          deno test -A ./src || echo "No test files found in ./src"
